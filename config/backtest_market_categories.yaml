    strategy: weather
    keywords: [temperature, degrees, celsius, fahrenheit, weather, hot, cold]
  weather_precipitation:
    strategy: weather
    keywords: [rain, snow, precipitation, weather, storm]
  weather_city:
    strategy: weather
    keywords: [london, new york, nyc, seoul, weather, temperature]

  # --- Both strategies (high value) ---
  both_elections:
    strategy: both
    keywords: [election, president, senate, house, nomination]
  both_macro:
    strategy: both
    keywords: [cpi, inflation, gdp, unemployment, fed, recession]
  both_crypto:
    strategy: both
    keywords: [bitcoin, ethereum, btc, eth, etf, crypto]
  both_sports:
    strategy: both
    keywords: [nba, nfl, super bowl, world series, champions league, world cup]
  both_geopolitics:
    strategy: both
    keywords: [ukraine, russia, israel, gaza, ceasefire, sanctions, invasion]
